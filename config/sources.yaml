sources:
  github:
    enabled: true

  product_hunt:
    enabled: true
    limit: 30

  aihot:
    enabled: true
    endpoint: https://aihot.virxact.com/api/public/items
    categories:
      - models
      - products
      - papers
      - industry
      - tools
    limit: 30
    timeout_ms: 20000
    max_retries: 2
    days_back: 3

  huggingface_models:
    enabled: true
    limit: 30

  huggingface_spaces:
    enabled: true
    limit: 30

  hackernews:
    enabled: true
    lists:
      - topstories
      - newstories
      - beststories
    limit_per_list: 30

  arxiv:
    enabled: true
    limit: 20
    days_back: 1
    categories:
      - cs.AI
      - cs.CL
      - cs.LG
      - cs.MA
