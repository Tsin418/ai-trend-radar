name = "ai-trend-radar-feishu-pusher"
main = "workers/feishu-pusher/src/index.ts"
compatibility_date = "2026-05-26"

[triggers]
crons = ["0 1 * * *"]

[vars]
DIGEST_URL = "https://raw.githubusercontent.com/Tsin418/ai-trend-radar/main/data/latest-daily-digest.json"
MAX_DIGEST_AGE_HOURS = "36"

# Bind a KV namespace named RADAR_STATE in Cloudflare for idempotency.
# Keep the binding out of this committed file unless you want to manage
# environment-specific namespace IDs through wrangler.toml.
