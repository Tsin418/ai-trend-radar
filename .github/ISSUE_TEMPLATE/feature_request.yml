name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest workable change.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add links, examples, or tradeoffs if relevant.
