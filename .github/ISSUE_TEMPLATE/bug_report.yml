name: Bug Report
description: Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, commands, and environment details.
      placeholder: |
        1. Copy .env.example to .env.local
        2. Run pnpm digest:send
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output. Remove secrets before submitting.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version
      placeholder: macOS 15 / Node 22 / pnpm 10
