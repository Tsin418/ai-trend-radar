name: AI Intelligence Lightweight Update

on:
  schedule:
    - cron: "0 6,12,18 * * *"
  workflow_dispatch:

concurrency:
  group: ai-intelligence-lightweight
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  intelligence-lightweight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
      PRODUCT_HUNT_ENABLED: ${{ vars.PRODUCT_HUNT_ENABLED }}
      PRODUCT_HUNT_POST_LIMIT: ${{ vars.PRODUCT_HUNT_POST_LIMIT }}
      PRODUCT_HUNT_DAYS_BACK: ${{ vars.PRODUCT_HUNT_DAYS_BACK }}
      PRODUCT_HUNT_TOPICS: ${{ vars.PRODUCT_HUNT_TOPICS }}
      PRODUCT_HUNT_KEYWORDS: ${{ vars.PRODUCT_HUNT_KEYWORDS }}
      PRODUCT_HUNT_MIN_VOTES: ${{ vars.PRODUCT_HUNT_MIN_VOTES }}
      PRODUCT_HUNT_MIN_COMMENTS: ${{ vars.PRODUCT_HUNT_MIN_COMMENTS }}
      HUGGINGFACE_MODELS_ENABLED: ${{ vars.HUGGINGFACE_MODELS_ENABLED }}
      HUGGINGFACE_MODELS_LIMIT: ${{ vars.HUGGINGFACE_MODELS_LIMIT }}
      HUGGINGFACE_MODELS_SORT: ${{ vars.HUGGINGFACE_MODELS_SORT }}
      HUGGINGFACE_MODELS_TIMEOUT_MS: ${{ vars.HUGGINGFACE_MODELS_TIMEOUT_MS }}
      HUGGINGFACE_MODELS_ENDPOINT: ${{ vars.HUGGINGFACE_MODELS_ENDPOINT }}
      HUGGINGFACE_SPACES_ENABLED: ${{ vars.HUGGINGFACE_SPACES_ENABLED }}
      HUGGINGFACE_SPACES_LIMIT: ${{ vars.HUGGINGFACE_SPACES_LIMIT }}
      AIHOT_ENABLED: ${{ vars.AIHOT_ENABLED }}
      AIHOT_ENDPOINT: ${{ vars.AIHOT_ENDPOINT }}
      AIHOT_LIMIT: ${{ vars.AIHOT_LIMIT }}
      AIHOT_TIMEOUT_MS: ${{ vars.AIHOT_TIMEOUT_MS }}
      AIHOT_MAX_RETRIES: ${{ vars.AIHOT_MAX_RETRIES }}
      AIHOT_DAYS_BACK: ${{ vars.AIHOT_DAYS_BACK }}
      AIHOT_CATEGORIES: ${{ vars.AIHOT_CATEGORIES }}
      HACKERNEWS_ENABLED: ${{ vars.HACKERNEWS_ENABLED }}
      HACKERNEWS_LISTS: ${{ vars.HACKERNEWS_LISTS }}
      HACKERNEWS_LIMIT_PER_LIST: ${{ vars.HACKERNEWS_LIMIT_PER_LIST }}
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate lightweight intelligence brief
        run: pnpm intelligence:lightweight

      - name: Commit latest intelligence brief
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          [ -f data/latest-intelligence-brief.json ] && git add data/latest-intelligence-brief.json
          git diff --cached --quiet || git commit -m "chore(radar): update lightweight intelligence brief"
          git push
