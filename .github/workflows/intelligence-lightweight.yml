name: AI Intelligence Lightweight Update

on:
  schedule:
    - cron: "0 6,12,18 * * *"
  workflow_dispatch:

concurrency:
  group: ai-intelligence-lightweight
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  intelligence-lightweight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
      TREND_LLM_ENRICHMENT_ENABLED: ${{ vars.TREND_LLM_ENRICHMENT_ENABLED }}
      HUGGINGFACE_MODELS_ENABLED: ${{ vars.HUGGINGFACE_MODELS_ENABLED }}
      HUGGINGFACE_SPACES_ENABLED: ${{ vars.HUGGINGFACE_SPACES_ENABLED }}
      AIHOT_ENABLED: ${{ vars.AIHOT_ENABLED }}
      HACKERNEWS_ENABLED: ${{ vars.HACKERNEWS_ENABLED }}
      ARXIV_ENABLED: ${{ vars.ARXIV_ENABLED }}
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate lightweight intelligence brief
        run: pnpm intelligence:lightweight

      - name: Commit latest intelligence brief
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          [ -f data/latest-intelligence-brief.json ] && git add data/latest-intelligence-brief.json
          [ -f data/llm-trend-enrichment-cache.json ] && git add data/llm-trend-enrichment-cache.json
          git diff --cached --quiet || git commit -m "chore(radar): update lightweight intelligence brief"
          git push
