name: AI Developer Radar Daily

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: ai-developer-radar-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  radar-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
      NOTIFIER_CHANNELS: feishu
      RADAR_REPO_LIMIT: ${{ vars.RADAR_REPO_LIMIT }}
      RADAR_RECOMMENDATION_LIMIT: ${{ vars.RADAR_RECOMMENDATION_LIMIT }}
      RADAR_DAILY_STAR_THRESHOLD: ${{ vars.RADAR_DAILY_STAR_THRESHOLD }}
      RADAR_EARLY_SIGNAL_DAILY_THRESHOLD: ${{ vars.RADAR_EARLY_SIGNAL_DAILY_THRESHOLD }}
      RADAR_EARLY_SIGNAL_WEEKLY_THRESHOLD: ${{ vars.RADAR_EARLY_SIGNAL_WEEKLY_THRESHOLD }}
      RADAR_PROFILE_KEYWORDS: ${{ vars.RADAR_PROFILE_KEYWORDS }}
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Send daily radar
        run: pnpm radar:daily:send

      - name: Commit radar snapshots
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/radar-store.json
          git diff --cached --quiet || git commit -m "chore(radar): update daily snapshots"
          git push
